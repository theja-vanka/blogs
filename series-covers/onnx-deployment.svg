      .post-num { font: 500 12px Inter, ui-sans-serif, system-ui, sans-serif; fill: #2F184B; }
      .mono { font: 500 30px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; fill: #2F184B; }
    </style>
